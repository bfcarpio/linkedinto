[tools]
prek = "latest"
python = "3.12"
uv = "latest"

[settings]
python.uv_venv_auto = "source"

[tasks.clean]
run = "rm -rf dist/ .pytest_cache/ .ruff_cache/ .ty/ __pycache__/ **/__pycache__/ linkedinto.egg-info/ .prek_cache/"
description = "Remove all generated and cache files"

[tasks.test]
run = "uvx pytest"
description = "Run tests quickly (no coverage)"

[tasks.test-coverage]
run = "uvx pytest --cov=linkedinto --cov-report=term-missing --cov-fail-under=80"
description = "Run tests with coverage report (minimum 80%)"

[tasks.coverage-report]
run = "uvx pytest --cov=linkedinto --cov-report=html --cov-report=xml && echo 'Coverage report available at htmlcov/index.html'"
description = "Generate HTML and XML coverage reports"

[tasks.lint]
run = "uvx ruff check src/ tests/"
description = "Run ruff linter"

[tasks.format]
run = "uvx ruff format --respect-gitignore --exclude tests/fixtures/"
description = "Check formatting with ruff"

[tasks.typecheck]
run = "uvx ty check src/ tests/"
description = "Run type checker"
