name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - README.md
  pull_request:
    branches: [master]
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint
        run: uvx ruff check src/ tests/

      - name: Format check
        run: uvx ruff format --check src/ tests/

      - name: Type check
        run: uvx python -m ty check src/ tests/

      - name: Test
        run: uvx pytest --cov=linkedinto --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
